<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Régie Technique - Le Geournal Quotidien !</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans" 
      x-data="{ 
        titrePrincipal: 'La Cour suprême renforce la politique migratoire de Trump', 
        alerteTexte: 'Selon plusieurs médias internationaux, l\'Ukraine aurait lancé une attaque de plus de 600 drones sur le territoire russe, marquant une nouvelle escalade du conflit. Moscou annonce des interceptions massives.',
        typeActu: 'américaine',
        statutSecondaire: 'Canicule !'
      }">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center space-x-3 mb-6 border-b border-slate-800 pb-4">
                <svg class="w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
                <h1 class="text-xl font-bold uppercase tracking-wider text-white">Régie Live - Le Geournal Quotidien !</h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold uppercase text-slate-400 tracking-wider mb-2">Titre Principal (Bandeau Bleu)</label>
                    <input type="text" x-model="titrePrincipal" 
                           class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 p-3 rounded-xl text-white text-sm outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 tracking-wider mb-2">Zone Géographique</label>
                    <select x-model="typeActu" 
                            class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 p-3 rounded-xl text-white text-sm outline-none transition cursor-pointer">
                        <option value="américaine">Actualité américaine</option>
                        <option value="française">Actualité française</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold uppercase text-slate-400 tracking-wider mb-2">Contenu du défilement (Alerte Info)</label>
                    <textarea x-model="alerteTexte" 
                              class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 p-3 rounded-xl text-white text-sm h-24 outline-none transition resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 tracking-wider mb-2">Badge Info Secondaire</label>
                    <input type="text" x-model="statutSecondaire" 
                           class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 p-3 rounded-xl text-white text-sm outline-none transition">
                    <p class="text-xs text-slate-500 mt-2">Ex: Canicule !, Urgent, Direct...</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-2xl">
            <p class="text-xs font-semibold uppercase text-slate-400 tracking-wider mb-3 flex items-center space-x-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                <span>Rendu Moniteur Final (Aspect 16:9)</span>
            </p>
            
            <div class="w-full aspect-video bg-slate-800 relative overflow-hidden rounded-xl shadow-inner select-none border border-slate-700">
                
                <div class="absolute top-6 left-6 right-6 flex justify-between items-start z-10">
                    <div class="flex items-center space-x-3">
                        <div class="w-12 h-12 bg-gradient-to-tr from-blue-700 to-cyan-500 rounded-full flex items-center justify-center text-white font-black text-xs shadow-lg border border-white/20">
                            GEOP
                        </div>
                        <div class="bg-white px-4 py-1.5 rounded-full shadow-md border border-slate-200 text-xs font-bold text-slate-900">
                            Actualité <span class="text-blue-600 font-extrabold" x-text="typeActu"></span>
                        </div>
                    </div>

                    <div class="bg-white px-3 py-1.5 rounded-full shadow-md border border-slate-200 flex items-center space-x-1.5 text-xs font-bold text-slate-900">
                        <span>Sources vérifiées</span>
                        <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.517 2.517a.75.75 0 001.138-.086l4-5.5z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>

                <div class="absolute bottom-28 left-6 bg-white/95 backdrop-blur-sm text-slate-950 font-bold px-4 py-1.5 rounded-full shadow-lg border border-slate-200 text-xs flex items-center space-x-2">
                    <span>Dimanche 28 Juin 2026</span>
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span>
                    <span class="text-blue-600 font-black">Saint Irénée de Lyon</span>
                </div>

                <div class="absolute inset-0 flex items-center justify-center text-slate-600/30 font-mono text-sm uppercase tracking-widest pointer-events-none">
                    [ Signal Vidéo Caméra Principal ]
                </div>

                <div class="absolute bottom-0 left-0 right-0 z-20 flex flex-col">
                    
                    <div class="bg-[#0000ff] text-white font-black text-center py-3.5 text-lg md:text-2xl tracking-wide uppercase shadow-2xl border-t border-blue-500"
                         x-text="titrePrincipal">
                    </div>

                    <div class="bg-white h-20 flex items-center px-6 border-t border-slate-100 shadow-inner">
                        <div class="flex items-center space-x-2 text-red-600 font-black text-sm uppercase tracking-tighter border-r-2 border-slate-200 pr-6 shrink-0">
                            <svg class="w-5 h-5 text-red-600 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span>Alerte Info</span>
                        </div>
                        
                        <div class="text-xs md:text-sm px-6 flex-1 font-bold text-slate-800 leading-snug tracking-tight"
                             x-text="alerteTexte">
                        </div>

                        <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-2.5 text-center rounded-xl font-black text-xs shrink-0 tracking-wide uppercase"
                             x-text="statutSecondaire">
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
    </div>

</body>
</html>
